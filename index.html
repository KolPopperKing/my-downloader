<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מוריד מדיה מתקדמת בענן</title>
    <style>
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: #e0e8f5; 
            margin: 0; 
            padding: 40px 20px; 
            text-align: center; 
            color: #2c3e50;
        }
        
        /* עיצוב Claymorphism רך ותלת מימדי לקופסאות */
        .box { 
            background: #fdfdfd; 
            max-width: 600px; 
            margin: 0 auto 30px auto; 
            padding: 30px; 
            border-radius: 24px; 
            box-shadow: 
                inset 4px 4px 8px rgba(255,255,255,0.9),
                inset -4px -4px 8px rgba(0,0,0,0.05),
                8px 12px 24px rgba(163,177,198,0.4),
                -8px -12px 24px rgba(255,255,255,0.6);
        }

        /* כותרת Claymorphism בולטת וחדשה */
        .main-title {
            color: #3b82f6;
            font-size: 28px;
            font-weight: 900;
            text-shadow: 1px 1px 0px #fff, 2px 2px 0px #cbd5e1;
            margin-bottom: 20px;
        }

        h3 {
            margin-top: 0;
            font-weight: 800;
        }

        /* עיצוב נפוח ורך לאינפוטים ותפריטים */
        input, select { 
            width: 80%; 
            padding: 14px; 
            border: none;
            outline: none;
            background: #f0f4f8;
            border-radius: 16px; 
            margin-bottom: 15px; 
            font-size: 16px; 
            box-shadow: 
                inset 2px 2px 5px rgba(0,0,0,0.05), 
                inset -2px -2px 5px rgba(255,255,255,0.8);
            transition: all 0.3s ease;
        }

        input:focus {
            box-shadow: 
                inset 2px 2px 5px rgba(0,0,0,0.1), 
                0 0 0 3px rgba(0,123,255,0.2);
        }

        /* כפתורי Claymorphism בולטים בעלי צבעים רווים */
        button { 
            padding: 14px 28px; 
            background: #3b82f6; 
            color: white; 
            border: none; 
            border-radius: 16px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold; 
            box-shadow: 
                inset 2px 2px 4px rgba(255,255,255,0.4),
                inset -2px -2px 4px rgba(0,0,0,0.15),
                0 6px 12px rgba(59,130,246,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:active {
            transform: scale(0.97);
            box-shadow: inset 3px 3px 6px rgba(0,0,0,0.2);
        }

        button.success { 
            background: #10b981; 
            width: 100%; 
            margin-top: 20px; 
            font-size: 18px; 
            box-shadow: 
                inset 2px 2px 4px rgba(255,255,255,0.4),
                0 6px 12px rgba(16,185,129,0.3);
        }

        /* רשימת עגלה משודרגת */
        .cart-item { 
            background: #f8fafc; 
            border: 2px solid #edf2f7; 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 16px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            text-align: right; 
        }

        .badge { 
            background: #ef4444; 
            color: white; 
            padding: 4px 10px; 
            border-radius: 8px; 
            font-size: 13px; 
            font-weight: bold;
            margin-left: 8px;
        }

        .badge.audio { 
            background: #f59e0b; 
            color: white; 
        }

        #loader { 
            display: none; 
            font-weight: bold; 
            margin: 20px; 
            color: #4b5563; 
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>

    <div class="box">
        <h2 class="main-title">🛒 מוריד סרטונים ופלייליסטים בענן</h2>
        <input type="text" id="linkInput" placeholder="הדבק לינק לסרטון או פלייליסט מיוטיוב...">
        <br>
        <button onclick="parseLink()">בדוק לינק</button>
        <div id="loader">הענן של גוגל מנתח את הקישור...</div>
    </div>

    <div class="box" id="resultsBox" style="display: none;">
        <h3 id="resultsTitle">תוצאות סריקה:</h3>
        <div style="margin-bottom: 20px;">
            <label style="font-weight: bold; margin-left: 10px;">בחר פורמט גלובלי לפריטים אלו:</label>
            <select id="globalFormat" style="width: auto; padding: 8px;">
                <option value="video">וידאו (MP4)</option>
                <option value="audio">אודיו (MP3)</option>
            </select>
        </div>
        <div id="linksList" style="max-height: 250px; overflow-y: auto; text-align: right; margin-bottom: 20px; padding: 10px; background: #f1f5f9; border-radius: 12px;"></div>
        <button onclick="addSelectedToCart()" style="background: #06b6d4; box-shadow: 0 6px 12px rgba(6,182,212,0.3);">➕ הוסף את המסומנים לעגלת הקניות</button>
    </div>

    <div class="box" id="cartBox" style="display: none;">
        <h3>📦 עגלת הקניות שלך (<span id="cartCount">0</span> פריטים)</h3>
        <div id="cartItems"></div>
        <button class="success" id="downloadBtn" onclick="downloadCart()">🎁 ארוז הכל לקובץ ZIP אחד והורד</button>
    </div>

    <script>
        // הכתובת הקבועה של ה-Google Colab שלך
       const SERVER_URL = "https://snooper-outlying-santa.ngrok-free.dev";
        
        let currentScannedVideos = []; 
        let cart = []; 

        // יצירת סאונד בועה (Pop) דינמי לפעולות הוספה בעגלה
        const playPopSound = () => {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.15);
        };

        async function parseLink() {
            const url = document.getElementById('linkInput').value;
            if(!url) return alert("נא להזין לינק תקין");
            
            const loader = document.getElementById('loader');
            const resultsBox = document.getElementById('resultsBox');
            const linksList = document.getElementById('linksList');
            
            loader.style.display = "block";
            resultsBox.style.display = "none";
            linksList.innerHTML = "";
            
            try {
                const cleanUrl = SERVER_URL.replace(/\/$/, "");
                const res = await fetch(`${cleanUrl}/parse?url=${encodeURIComponent(url)}`, {
                    method: "GET",
                    mode: "cors",
                    headers: {
                        "Accept": "application/json"
                    }
                });
                const data = await res.json();
                loader.style.display = "none";
                
                if (data.error) return alert("שגיאה בניתוח הלינק: " + data.error);
                
                currentScannedVideos = data.videos;
                document.getElementById('resultsTitle').innerText = data.type === 'playlist' ? `פלייליסט: ${data.title}` : "סרטון בודד נמצא!";
                
                currentScannedVideos.forEach((vid, index) => {
                    linksList.innerHTML += `
                        <div style="padding: 8px 0; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center;">
                            <input type="checkbox" id="vid_${index}" checked style="width: auto; margin-left: 12px; margin-bottom: 0;">
                            <label for="vid_${index}" style="cursor: pointer; font-size: 14px;">${vid.title}</label>
                        </div>
                    `;
                });
                
                resultsBox.style.display = "block";
            } catch(e) {
                loader.style.display = "none";
                // במידה והדפדפן חוסם, פותחים חלון אישור זמני שמפעיל את הפרוקסי של גוגל
                alert("נדרש אישור אבטחה מהדפדפן מול גוגל ענן.\nבחלון החדש שייפתח, ודא שאתה רואה הודעת 'Alive', ואז תחזור לכאן ותלחץ שוב על כפתור הבדיקה!");
                window.open(`${SERVER_URL}/parse?url=${encodeURIComponent(url)}`, '_blank');
            }
        }

        function addSelectedToCart() {
            const format = document.getElementById('globalFormat').value;
            let addedAny = false;
            
            currentScannedVideos.forEach((vid, index) => {
                const checkbox = document.getElementById(`vid_${index}`);
                if (checkbox && checkbox.checked) {
                    if (!cart.some(item => item.id === vid.id)) {
                        cart.push({
                            id: vid.id,
                            title: vid.title,
                            url: vid.url,
                            type: format
                        });
                        addedAny = true;
                    }
                }
            });
            
            if(addedAny) playPopSound(); // השמעת צליל הפידבק החדש
            
            document.getElementById('resultsBox').style.display = "none";
            document.getElementById('linkInput').value = ""; 
            renderCart();
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            renderCart();
        }

        function renderCart() {
            const cartBox = document.getElementById('cartBox');
            const cartItems = document.getElementById('cartItems');
            const cartCount = document.getElementById('cartCount');
            
            cartItems.innerHTML = "";
            cartCount.innerText = cart.length;
            
            if(cart.length === 0) {
                cartBox.style.display = "none";
                return;
            }
            
            cart.forEach(item => {
                const badgeClass = item.type === 'audio' ? 'badge audio' : 'badge';
                const badgeText = item.type === 'audio' ? 'MP3' : 'MP4';
                
                cartItems.innerHTML += `
                    <div class="cart-item">
                        <div>
                            <span class="${badgeClass}">${badgeText}</span>
                            <strong>${item.title}</strong>
                        </div>
                        <button onclick="removeFromCart('${item.id}')" style="background:#ef4444; padding: 6px 12px; font-size:13px; box-shadow: 0 4px 8px rgba(239,68,68,0.2);">מחק</button>
                    </div>
                `;
            });
            
            cartBox.style.display = "block";
        }

        async function downloadCart() {
            const downloadBtn = document.getElementById('downloadBtn');
            downloadBtn.innerText = "⚡ הענן של גוגל מוריד ואורז ל-ZIP... נא להמתין...";
            downloadBtn.disabled = true;
            
            try {
                const cleanUrl = SERVER_URL.replace(/\/$/, "");
                // שינוי ה-Content-Type ל-text/plain עוקף לחלוטין בקשות Preflight OPTIONS וחוסך שגיאות CORS
                const response = await fetch(`${cleanUrl}/bundle`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'text/plain'
                    },
                    body: JSON.stringify(cart)
                });
                const data = await response.json();
                
                if(data.zip_id) {
                    window.location.href = `${cleanUrl}/download/${data.zip_id}`;
                    downloadBtn.innerText = "הורדה החלה!";
                    setTimeout(() => {
                        cart = []; 
                        renderCart();
                        downloadBtn.innerText = "🎁 ארוז הכל לקובץ ZIP אחד והורד";
                        downloadBtn.disabled = false;
                    }, 3000);
                } else {
                    alert("שגיאה ביצירת ה-ZIP בענן.");
                    downloadBtn.disabled = false;
                }
            } catch(e) {
                alert("המערכת נכשלה באריזה. נסה שוב.");
                downloadBtn.disabled = false;
                downloadBtn.innerText = "🎁 ארוז הכל לקובץ ZIP אחד והורד";
            }
        }
    </script>
</body>
</html>
