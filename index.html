<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding: 50px; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; width: 400px; }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background: #ff0000; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #loader { display: none; margin: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔥 מוריד הסרטונים שלי</h2>
        <input type="text" id="url" placeholder="הדבק לינק ליוטיוב...">
        <button onclick="go()">הורד עכשיו</button>
        <div id="loader">מעבד נתונים...</div>
        <div id="out" style="margin-top: 20px;"></div>
    </div>

    <script>
        async function go() {
            const url = document.getElementById('url').value;
            const out = document.getElementById('out');
            const loader = document.getElementById('loader');
            
            out.innerHTML = "";
            loader.style.display = "block";
            
            try {
                const response = await fetch("https://cool-months-run.loca.lt/download?url=" + encodeURIComponent(url));
                const data = await response.json();
                loader.style.display = "none";
                
                if(data.download_url) {
                    out.innerHTML = `<h3>הסרטון מוכן!</h3>
                                     <a href="${data.download_url}" target="_blank" style="color: blue;">לחץ להורדה ישירה</a>`;
                } else {
                    out.innerText = "שגיאה: לא הצלחתי למצוא לינק להורדה.";
                }
            } catch(e) {
                loader.style.display = "none";
                out.innerText = "שגיאה: וודא שהמחשב דלוק והטרמינל רץ!";
            }
        }
    </script>
</body>
</html>
