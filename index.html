<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מוריד סרטונים מקצועי</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f4f4f9; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); display: inline-block; width: 400px; }
        input, select { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; }
        button { width: 95%; padding: 12px; background: #e62117; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        #loader { display: none; margin: 20px; color: #555; }
        #out { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>YouTube Downloader</h2>
        <input type="text" id="url" placeholder="הדבק לינק כאן...">
        <select id="mediaType">
            <option value="video">וידאו (MP4)</option>
            <option value="audio">אודיו (MP3/Webm)</option>
        </select>
        <button onclick="go()">הורד עכשיו</button>
        <div id="loader">טוען נתונים...</div>
        <div id="out"></div>
    </div>

    <script>
        async function go() {
            const url = document.getElementById('url').value;
            const type = document.getElementById('mediaType').value;
            const out = document.getElementById('out');
            const loader = document.getElementById('loader');
            
            out.innerHTML = "";
            loader.style.display = "block";
            
            try {
                // עדכן כאן את הלינק שלך מהטרמינל!
                const res = await fetch(`https://cool-months-run.loca.lt/download?url=${encodeURIComponent(url)}&type=${type}`);
                const data = await res.json();
                loader.style.display = "none";
                
                if(data.download_url) {
                    out.innerHTML = `<h3>${data.title}</h3>
                                     <img src="${data.thumbnail}" width="200" style="border-radius:10px;"><br><br>
                                     <a href="${data.download_url}" download target="_blank" style="text-decoration:none; background:#28a745; color:white; padding:10px 20px; border-radius:5px;">לחץ להורדה</a>`;
                } else {
                    out.innerHTML = `<p style="color:red;">שגיאה: ${data.error || 'נא לבדוק שהטרמינל פתוח'}</p>`;
                }
            } catch(e) {
                loader.style.display = "none";
                out.innerText = "שגיאה בחיבור לשרת במחשב.";
            }
        }
    </script>
</body>
</html>
