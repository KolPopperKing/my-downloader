<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asher Ultimate Music Organizer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #e8eff9;
            --clay: #f3f7fc;
            --primary: #2563eb;
            --primary-light: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --text: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 25px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .clay-box {
            background: var(--clay); border-radius: 32px; padding: 30px; width: 100%; max-width: 760px;
            box-shadow: 10px 10px 22px #cbd5e1, -10px -10px 22px #ffffff, inset 3px 3px 6px rgba(255,255,255,0.7);
            border: 2px solid #ffffff; box-sizing: border-box; margin-bottom: 25px;
        }

        h1 { font-size: 28px; font-weight: 900; text-align: center; color: var(--primary); margin: 0 0 20px 0; }
        
        .input-group { display: flex; gap: 12px; margin-bottom: 15px; }
        input[type="text"], select {
            padding: 14px 18px; border: none; outline: none; background: #e2eaf5;
            color: var(--text); border-radius: 18px; font-size: 15px; font-weight: 600;
            box-shadow: inset 3px 3px 6px #b8c9df, inset -3px -3px 6px #ffffff; flex-grow: 1;
        }

        /* מגרש העלאת קבצים מקומיים (Upload Dropzone) */
        .upload-zone {
            border: 3px dashed #b8c9df; padding: 20px; border-radius: 22px; text-align: center;
            background: rgba(255,255,255,0.3); cursor: pointer; transition: 0.2s; font-weight: 700; color: var(--text-muted);
        }
        .upload-zone:hover { background: rgba(255,255,255,0.6); border-color: var(--primary); color: var(--primary); }

        .btn {
            padding: 14px 24px; border: none; border-radius: 18px; cursor: pointer; font-weight: 800; font-size: 15px;
            color: white; display: inline-flex; align-items: center; gap: 8px; justify-content: center;
            box-shadow: inset 2px 2px 4px rgba(255,255,255,0.3), 3px 6px 12px rgba(163,177,198,0.4); transition: 0.1s ease;
        }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-light)); }
        .btn-success { background: linear-gradient(135deg, #10b981, #059669); width: 100%; font-size: 17px; padding: 16px; margin-top: 15px;}
        .btn-danger { background: var(--danger); padding: 8px 12px; border-radius: 12px; }
        .btn:active { transform: scale(0.97); box-shadow: inset 3px 3px 6px rgba(0,0,0,0.2); }

        /* סרגל עגלה צף */
        #cartToggle {
            position: fixed; bottom: 30px; left: 30px; width: 75px; height: 75px; border-radius: 24px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; font-size: 26px;
            display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000;
            box-shadow: 5px 10px 20px rgba(59,130,246,0.3); border: 2px solid #ffffff;
        }
        #cartBadge { position: absolute; top: -5px; right: -5px; background: var(--danger); color: white; border-radius: 50%; padding: 4px 9px; font-size: 12px; font-weight: bold; border: 2px solid #ffffff; }

        #cartOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(224,232,245,0.6); display: none; z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(12px); }
        .modal-content { max-height: 85vh; overflow-y: auto; width: 95%; max-width: 740px; }

        /* כרטיס שיר מתקדם בעגלה */
        .item-row {
            background: var(--clay); border: 2px solid #ffffff; padding: 18px; margin-bottom: 15px; border-radius: 22px;
            display: flex; flex-direction: column; gap: 12px; box-shadow: 4px 6px 12px rgba(163,177,198,0.15); text-align: right;
        }
        .item-header { display: flex; justify-content: space-between; align-items: center; }
        .item-title { font-weight: 800; font-size: 16px; color: var(--primary); }
        .tag-editor { display: flex; flex-wrap: wrap; gap: 10px; background: rgba(255,255,255,0.4); padding: 12px; border-radius: 16px; box-shadow: inset 1px 1px 3px rgba(0,0,0,0.05); }
        .tag-field { display: flex; flex-direction: column; gap: 4px; flex-grow: 1; min-width: 140px; }
        .tag-field label { font-size: 11px; font-weight: 800; color: var(--text-muted); }
        .tag-field input { padding: 8px 12px; border: none; background: #e2eaf5; border-radius: 10px; font-size: 13px; font-weight: 600; box-shadow: inset 2px 2px 4px #cbd5e1; }

        #loader { display: none; font-weight: 800; color: var(--primary); text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="clay-box">
        <h1><i class="fa-solid fa-music"></i> Asher Music Workspace v5.0</h1>
        
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="הדבק לינק מיוטיוב (סרטון או פלייליסט שלם)...">
            <button class="btn btn-primary" onclick="scan()"><i class="fa-solid fa-plus"></i> משוך לעגלה</button>
        </div>

        <div style="text-align: center; margin: 15px 0; font-weight: 800; color: var(--text-muted);">— או —</div>

        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
            <i class="fa-solid fa-cloud-arrow-up" style="font-size: 24px; margin-bottom: 8px; display: block;"></i>
            לחץ או גרור קובצי שמע (MP3/MP4) קיימים מהמחשב שלך לכאן
            <input type="file" id="fileInput" multiple style="display: none;" onchange="uploadFiles(this.files)">
        </div>

        <div id="loader"><i class="fa-solid fa-spinner fa-spin"></i> מעבד נתוני מדיה...</div>
    </div>

    <div id="cartToggle" onclick="toggleCart()">
        <i class="fa-solid fa-compact-disc"></i>
        <span id="cartBadge">0</span>
    </div>

    <div id="cartOverlay" onclick="if(event.target == this) toggleCart()">
        <div class="clay-box modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin:0; font-size: 22px; font-weight:900; color:var(--primary);"><i class="fa-solid fa-sliders"></i> ניהול ואוצרות חבילת מוזיקה</h2>
                <button class="btn btn-primary" onclick="toggleCart()" style="padding: 8px 16px; border-radius: 12px; font-size: 13px;">סגור</button>
            </div>

            <div id="cartList" style="max-height: 52vh; overflow-y: auto; margin-bottom: 15px; padding-left: 5px;"></div>

            <button class="btn btn-success" id="dlBtn" onclick="startDownload()"><i class="fa-solid fa-download"></i> תקן תגיות, סדר בתיקיות והורד ZIP</button>
        </div>
    </div>

    <script>
        const SERVER_URL = "https://asher-media-cloud.loca.lt";
        let cart = [];

        async function scan() {
            const url = document.getElementById('urlInput').value;
            if(!url) return;
            document.getElementById('loader').style.display = "block";
            try {
                const res = await fetch(`${SERVER_URL}/parse?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                data.forEach(v => {
                    if(!cart.some(c => c.id === v.id)) {
                        cart.push({ ...v, type: 'audio', folder: '', bitrate: '320', start: '', end: '', album: 'Asher Cloud' });
                    }
                });
                updateUI(); toggleCart(true);
            } catch(e) { alert("שגיאה בסריקה"); }
            document.getElementById('loader').style.display = "none";
            document.getElementById('urlInput').value = "";
        }

        async function uploadFiles(files) {
            if(files.length === 0) return;
            document.getElementById('loader').style.display = "block";
            for(let file of files) {
                const formData = new FormData();
                formData.append("file", file);
                try {
                    const res = await fetch(`${SERVER_URL}/upload`, { method: 'POST', body: formData });
                    const data = await res.json();
                    cart.push({
                        id: data.filename, title: data.title, uploader: 'אמן מקומי', duration: 'קובץ מקומי',
                        source: 'local', filename: data.filename, type: 'audio', folder: 'העלאות מקומיות', bitrate: '192', start: '', end: '', album: 'הורדות שלי'
                    });
                } catch(e) { alert("כשילון בהעלאת קובץ " + file.name); }
            }
            updateUI(); toggleCart(true);
            document.getElementById('loader').style.display = "none";
        }

        function updateUI() {
            document.getElementById('cartBadge').innerText = cart.length;
            const list = document.getElementById('cartList');
            if(cart.length === 0) { list.innerHTML = `<div style="color:var(--text-muted); padding:20px; text-align:center; font-weight:600;">אין שירים או קבצים במארגן...</div>`; return; }

            list.innerHTML = cart.map((item, i) => `
                <div class="item-row">
                    <div class="item-header">
                        <div>
                            <span class="item-title">${item.title}</span>
                            <div style="font-size:11px; color:var(--text-muted); font-weight:700; margin-top:3px;">
                                ${item.source === 'local' ? '📁 קובץ שהועלה מהמחשב' : '🌐 קישור מיוטיוב'} | אורך: ${item.duration}
                            </div>
                        </div>
                        <button class="btn btn-danger" onclick="cart.splice(${i},1); updateUI();"><i class="fa-solid fa-trash-can"></i></button>
                    </div>

                    <div class="tag-editor">
                        <div class="tag-field"><label>שם השיר (Title)</label><input type="text" value="${item.title}" onchange="cart[${i}].title = this.value"></div>
                        <div class="tag-field"><label>שם האמן (Artist)</label><input type="text" value="${item.uploader}" onchange="cart[${i}].uploader = this.value"></div>
                        <div class="tag-field"><label>אלבום (Album)</label><input type="text" value="${item.album || ''}" onchange="cart[${i}].album = this.value"></div>
                        <div class="tag-field"><label>📁 נתיב תיקייה ב-ZIP</label><input type="text" placeholder="למשל: רמיקסים..." value="${item.folder}" onchange="cart[${i}].folder = this.value"></div>
                        <div class="tag-field" style="min-width:90px;">
                            <label>פורמט</label>
                            <select onchange="cart[${i}].type = this.value" style="padding:7px; font-size:12px;">
                                <option value="audio" ${item.type==='audio'?'selected':''}>MP3</option>
                                <option value="video" ${item.type==='video'?'selected':''}>MP4</option>
                            </select>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleCart(forceOpen = false) {
            const el = document.getElementById('cartOverlay');
            el.style.display = (forceOpen || el.style.display === 'none' || el.style.display === '') ? 'flex' : 'none';
        }

        async function startDownload() {
            if(cart.length === 0) return;
            const btn = document.getElementById('dlBtn');
            btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> מעבד תגיות, יוצר מבנה תיקיות ומוריד...";
            btn.disabled = true;

            try {
                const res = await fetch(`${SERVER_URL}/bundle`, {
                    method: 'POST', headers: {'Content-Type': 'text/plain'}, body: JSON.stringify(cart)
                });
                const { zip_id } = await res.json();
                window.location.href = `${SERVER_URL}/download/${zip_id}`;
                btn.innerHTML = "✨ הכל מוכן! ההורדה התחילה.";
                setTimeout(() => { cart = []; updateUI(); toggleCart(false); btn.disabled = false; btn.innerHTML = "<i class='fa-solid fa-download'></i> תקן תגיות, סדר בתיקיות והורד ZIP"; }, 4000);
            } catch(e) { alert("הארגון נכשל."); btn.disabled = false; }
        }
    </script>
</body>
</html>
