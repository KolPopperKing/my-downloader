<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Asher Media Cloud v2.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg: #e0e8f5; --clay: #fdfdfd; --primary: #3b82f6; --success: #10b981; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; overflow-x: hidden; }
        
        /* Claymorphism Style */
        .clay { 
            background: var(--clay); border-radius: 25px; 
            box-shadow: inset 4px 4px 8px #ffffff, inset -4px -4px 8px rgba(0,0,0,0.05), 8px 12px 24px rgba(163,177,198,0.4);
            padding: 25px; margin: 20px auto; max-width: 600px;
        }

        .btn { 
            padding: 12px 25px; border: none; border-radius: 15px; cursor: pointer; font-weight: bold;
            transition: 0.3s; box-shadow: inset 2px 2px 4px rgba(255,255,255,0.4), 0 6px 12px rgba(0,0,0,0.1);
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; width: 100%; font-size: 18px; }
        .btn:active { transform: scale(0.95); box-shadow: inset 4px 4px 8px rgba(0,0,0,0.2); }

        /* Floating Cart */
        #cartToggle {
            position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px; border-radius: 50%;
            background: var(--primary); color: white; font-size: 24px; display: flex; align-items: center;
            justify-content: center; cursor: pointer; z-index: 1000; transition: 0.3s;
        }
        #cartBadge { position: absolute; top: 0; left: 0; background: #ef4444; border-radius: 50%; padding: 5px 10px; font-size: 12px; }

        /* Cart Overlay */
        #cartOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5);
            display: none; z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        .cart-content { width: 90%; max-width: 700px; max-height: 80vh; overflow-y: auto; position: relative; }

        /* List Items */
        .item { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid #eee; }
        .item-controls { display: flex; gap: 10px; align-items: center; }
        input[type="text"] { border: none; background: #f1f5f9; padding: 8px; border-radius: 10px; box-shadow: inset 2px 2px 4px rgba(0,0,0,0.05); }
        select { border: none; background: #f1f5f9; padding: 8px; border-radius: 10px; }

        #loader { display: none; font-weight: bold; color: var(--primary); margin: 20px; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="clay">
        <h2>🚀 Asher Media Cloud v2.0</h2>
        <input type="text" id="urlInput" placeholder="הדבק לינק מיוטיוב..." style="width: 75%;">
        <button class="btn btn-primary" onclick="scan()">סרוק</button>
        <div id="loader">הענן מעבד את הבקשה...</div>
    </div>

    <div id="cartToggle" onclick="toggleCart()">
        <i class="fa-solid fa-cart-shopping"></i>
        <span id="cartBadge">0</span>
    </div>

    <div id="cartOverlay" onclick="if(event.target == this) toggleCart()">
        <div class="clay cart-content">
            <h3>📦 עגלת הקניות שלך</h3>
            <div id="bulkActions" style="margin-bottom: 20px; background: #f8fafc; padding: 15px; border-radius: 15px;">
                <label>החל על הכל:</label>
                <select id="bulkType">
                    <option value="audio">MP3</option>
                    <option value="video">MP4</option>
                </select>
                <input type="text" id="bulkFolder" placeholder="תיקייה לכולם...">
                <button class="btn btn-primary" onclick="applyBulk()" style="padding: 5px 15px;">החל</button>
            </div>
            <div id="cartList"></div>
            <button class="btn btn-success" id="dlBtn" onclick="startDownload()">ארוז ZIP ודחוס (BZIP2)</button>
        </div>
    </div>

    <script>
        const SERVER_URL = "https://sweet-pigs-wish.loca.lt";
        let cart = [];

        async function scan() {
            const url = document.getElementById('urlInput').value;
            if(!url) return;
            document.getElementById('loader').style.display = "block";
            try {
                const res = await fetch(`${SERVER_URL}/parse?url=${encodeURIComponent(url)}`);
                const videos = await res.json();
                videos.forEach(v => {
                    if(!cart.some(c => c.id === v.id)) {
                        cart.push({...v, type: 'audio', folder: ''});
                    }
                });
                updateUI();
                toggleCart(true);
            } catch(e) { alert("שגיאה בתקשורת עם השרת"); }
            document.getElementById('loader').style.display = "none";
        }

        function updateUI() {
            document.getElementById('cartBadge').innerText = cart.length;
            const list = document.getElementById('cartList');
            list.innerHTML = cart.map((item, i) => `
                <div class="item">
                    <div style="max-width: 40%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                        <strong>${item.title}</strong>
                    </div>
                    <div class="item-controls">
                        <select onchange="cart[${i}].type = this.value">
                            <option value="audio" ${item.type==='audio'?'selected':''}>MP3</option>
                            <option value="video" ${item.type==='video'?'selected':''}>MP4</option>
                        </select>
                        <input type="text" placeholder="תיקייה..." value="${item.folder}" onchange="cart[${i}].folder = this.value">
                        <i class="fa-solid fa-trash" style="color: #ef4444; cursor:pointer;" onclick="cart.splice(${i},1); updateUI();"></i>
                    </div>
                </div>
            `).join('');
        }

        function toggleCart(forceOpen = false) {
            const el = document.getElementById('cartOverlay');
            el.style.display = (forceOpen || el.style.display === 'none' || el.style.display === '') ? 'flex' : 'none';
        }

        function applyBulk() {
            const type = document.getElementById('bulkType').value;
            const folder = document.getElementById('bulkFolder').value;
            cart.forEach(item => { item.type = type; item.folder = folder; });
            updateUI();
        }

        async function startDownload() {
            if(cart.length === 0) return;
            const btn = document.getElementById('dlBtn');
            btn.innerText = "⚡ מעבד, דוחס ומטמיע קאברים... נא להמתין";
            btn.disabled = true;
            try {
                const res = await fetch(`${SERVER_URL}/bundle`, {
                    method: 'POST',
                    headers: {'Content-Type': 'text/plain'},
                    body: JSON.stringify(cart)
                });
                const { zip_id } = await res.json();
                window.location.href = `${SERVER_URL}/download/${zip_id}`;
                btn.innerText = "הורדה החלה!";
            } catch(e) { alert("שגיאה באריזה"); }
            setTimeout(() => { btn.disabled = false; btn.innerText = "🎁 ארוז ZIP ודחוס (BZIP2)"; }, 5000);
        }
    </script>
</body>
</html>
