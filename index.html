<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asher Music Curator Workspace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #e0e8f3;
            --clay: #f0f4f9;
            --primary: #2563eb;
            --primary-glow: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --text: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg);
            color: var(--text); margin: 0; padding: 30px 20px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .clay-card {
            background: var(--clay); border-radius: 35px; padding: 35px; width: 100%; max-width: 780px;
            box-shadow: 12px 12px 24px #b8c5d6, -12px -12px 24px #ffffff, inset 4px 4px 8px rgba(255,255,255,0.7);
            border: 2px solid #ffffff; box-sizing: border-box; margin-bottom: 25px;
        }

        h1 { font-size: 30px; font-weight: 900; color: var(--primary); text-align: center; margin-top:0; margin-bottom: 25px; }

        .input-group { display: flex; gap: 12px; margin-bottom: 15px; }
        input[type="text"], select {
            padding: 15px 20px; border: none; outline: none; background: #e3ecf5;
            color: var(--text); border-radius: 20px; font-size: 15px; font-weight: 600;
            box-shadow: inset 3px 3px 6px #b8c4d4, inset -3px -3px 6px #ffffff; flex-grow: 1;
        }

        .btn {
            padding: 15px 26px; border: none; border-radius: 20px; cursor: pointer; font-weight: 800; font-size: 15px;
            color: white; display: inline-flex; align-items: center; gap: 8px; justify-content: center;
            box-shadow: inset 2px 2px 4px rgba(255,255,255,0.3), 4px 8px 16px rgba(163,177,198,0.4); transition: 0.1s ease;
        }
        .btn-primary { background: linear-gradient(135deg, var(--primary-glow), var(--primary)); }
        .btn-success { background: linear-gradient(135deg, #10b981, #059669); width: 100%; font-size: 18px; padding: 18px; margin-top: 10px; }
        .btn-danger { background: var(--danger); padding: 8px 14px; border-radius: 12px; }
        .btn:active { transform: scale(0.97); box-shadow: inset 3px 3px 6px rgba(0,0,0,0.2); }

        /* כפתור עגלה תלת ממדי */
        #cartToggle {
            position: fixed; bottom: 35px; left: 35px; width: 80px; height: 80px; border-radius: 26px;
            background: linear-gradient(135deg, var(--primary-glow), var(--primary)); color: white; font-size: 28px;
            display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000;
            box-shadow: 5px 10px 25px rgba(59,130,246,0.35); border: 2px solid #ffffff;
        }
        #cartBadge { position: absolute; top: -5px; right: -5px; background: var(--danger); color: white; border-radius: 50%; padding: 4px 10px; font-size: 12px; font-weight: bold; border: 2px solid #ffffff; }

        #cartOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(219,228,241,0.6); display: none; z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .modal-content { max-height: 85vh; overflow-y: auto; width: 95%; max-width: 760px; }

        /* כלים חכמים קבוצתיים */
        .bulk-bar { background: #e2edf7; padding: 18px; border-radius: 22px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: space-between; box-shadow: inset 3px 3px 6px #b8c4d4, inset -3px -3px 6px #ffffff; }

        /* שורת שיר */
        .item-row {
            background: var(--clay); border: 2px solid #ffffff; padding: 20px; margin-bottom: 15px; border-radius: 24px;
            display: flex; flex-direction: column; gap: 12px; box-shadow: 5px 8px 16px rgba(163,177,198,0.2); text-align: right;
        }
        .item-header { display: flex; justify-content: space-between; align-items: center; }
        .item-title { font-weight: 800; font-size: 16px; color: var(--primary); max-width: 80%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .tag-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; background: rgba(255,255,255,0.3); padding: 12px; border-radius: 18px; }
        .field-box { display: flex; flex-direction: column; gap: 4px; }
        .field-box label { font-size: 11px; font-weight: 800; color: var(--text-muted); }
        .field-box input, .field-box select { padding: 8px 12px; border: none; background: #e3ecf5; border-radius: 12px; font-size: 13px; font-weight: 600; box-shadow: inset 2px 2px 4px #b8c4d4; }

        #loader { display: none; font-weight: 800; color: var(--primary); text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="clay-card">
        <h1><i class="fa-solid fa-wand-magic-sparkles"></i> Asher Music Curator Workspace</h1>
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="הדבק כאן קישור לסרטון בודד או לפלייליסט שלם מיוטיוב...">
            <button class="btn btn-primary" onclick="scan()"><i class="fa-solid fa-magnifying-glass-plus"></i> משוך ופרק קבצים</button>
        </div>
        <div id="loader"><i class="fa-solid fa-compact-disc fa-spin"></i> מנוע הענן מפרק ומנקה שמות מטא-דאטה...</div>
    </div>

    <div id="cartToggle" onclick="toggleCart()">
        <i class="fa-solid fa-sliders"></i>
        <span id="cartBadge">0</span>
    </div>

    <div id="cartOverlay" onclick="if(event.target == this) toggleCart()">
        <div class="clay-card modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin:0; font-size: 22px; font-weight:900; color:var(--primary);"><i class="fa-solid fa-list-check"></i> עורך המטא-דאטה והתיקיות המרכזי</h2>
                <button class="btn btn-primary" onclick="toggleCart()" style="padding: 8px 16px; border-radius: 12px; font-size: 13px;">סגור</button>
            </div>

            <div class="bulk-bar">
                <button class="btn btn-primary" onclick="applySmartFolders('playlist')" id="playlistBulkBtn" style="padding: 10px 14px; font-size: 12px; display:none;"><i class="fa-solid fa-folder-plus"></i> סדר בתיקיית פלייליסט</button>
                <button class="btn btn-primary" onclick="applySmartFolders('artist')" style="padding: 10px 14px; font-size: 12px;"><i class="fa-solid fa-users-gear"></i> חלוקה לתיקיות לפי אמן</button>
                <select id="bulkBitrate" style="padding:8px; font-size:12px; flex-grow:0; width:110px;">
                    <option value="192">192kbps</option>
                    <option value="320">320kbps HQ</option>
                </select>
                <button class="btn btn-primary" onclick="applyBulkBitrate()" style="padding: 10px 14px; font-size: 12px;">עדכן איכות</button>
            </div>

            <div id="cartList" style="max-height: 50vh; overflow-y: auto; margin-bottom: 15px; padding-left: 5px;"></div>

            <button class="btn btn-success" id="dlBtn" onclick="startDownload()"><i class="fa-solid fa-play"></i> הפעל הורדה מקבילית, צרוב מטא-דאטה והורד ZIP</button>
        </div>
    </div>

    <script>
        const SERVER_URL = "https://early-planets-burn.loca.lt";
        let cart = [];
        let currentPlaylistName = "";

        async function scan() {
            const url = document.getElementById('urlInput').value;
            if(!url) return;
            document.getElementById('loader').style.display = "block";
            try {
                const res = await fetch(`${SERVER_URL}/parse?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                
                if(data.error) { alert("שגיאה מהשרת: " + data.error); }
                else {
                    data.forEach(v => {
                        if(!cart.some(c => c.id === v.id)) {
                            if(v.playlist_name) currentPlaylistName = v.playlist_name;
                            cart.push({
                                ...v, type: 'audio', folder: '', bitrate: '320', start: '', end: '', album: v.playlist_name || 'Asher Cloud'
                            });
                        }
                    });
                    
                    if(currentPlaylistName) {
                        const pBtn = document.getElementById('playlistBulkBtn');
                        pBtn.innerText = `📁 סדר בתיקיית "${currentPlaylistName}"`;
                        pBtn.style.display = "inline-flex";
                    }
                    
                    updateUI(); toggleCart(true);
                }
            } catch(e) { alert("וודא שקולאב מופעל ושהזנת את כתובת ה-SERVER_URL הנכונה!"); }
            document.getElementById('loader').style.display = "none";
            document.getElementById('urlInput').value = "";
        }

        function updateUI() {
            document.getElementById('cartBadge').innerText = cart.length;
            const list = document.getElementById('cartList');
            if(cart.length === 0) { list.innerHTML = `<div style="color:var(--text-muted); padding:30px; text-align:center; font-weight:600;">מארגן המוזיקה ריק. סרוק לינק...</div>`; return; }

            list.innerHTML = cart.map((item, i) => `
                <div class="item-row">
                    <div class="item-header">
                        <div>
                            <span class="item-title">${item.title}</span>
                            <div style="font-size:11px; color:var(--text-muted); font-weight:700; margin-top:2px;"><i class="fa-solid fa-clock"></i> אורך מקורי: ${item.duration}</div>
                        </div>
                        <button class="btn btn-danger" onclick="cart.splice(${i},1); updateUI();"><i class="fa-solid fa-trash-can"></i></button>
                    </div>

                    <div class="tag-grid">
                        <div class="field-box"><label>שם השיר המזוקק</label><input type="text" value="${item.title}" onchange="cart[${i}].title = this.value"></div>
                        <div class="field-box"><label>שם האמן (Artist)</label><input type="text" value="${item.uploader}" onchange="cart[${i}].uploader = this.value"></div>
                        <div class="field-box"><label>אלבום (Album)</label><input type="text" value="${item.album}" onchange="cart[${i}].album = this.value"></div>
                        <div class="field-box"><label>📁 תיקיית יעד ב-ZIP</label><input type="text" placeholder="תיקייה..." value="${item.folder}" onchange="cart[${i}].folder = this.value"></div>
                        
                        <div class="field-box">
                            <label>חיתוך: התחלה</label>
                            <input type="text" placeholder="00:00" value="${item.start}" onchange="cart[${i}].start = this.value">
                        </div>
                        <div class="field-box">
                            <label>חיתוך: סיום</label>
                            <input type="text" placeholder="03:45" value="${item.end}" onchange="cart[${i}].end = this.value">
                        </div>

                        <div class="field-box">
                            <label>איכות שמע</label>
                            <select onchange="cart[${i}].bitrate = this.value">
                                <option value="192" ${item.bitrate==='192'?'selected':''}>192kbps</option>
                                <option value="320" ${item.bitrate==='320'?'selected':''}>320kbps HQ</option>
                            </select>
                        </div>
                        <div class="field-box">
                            <label>פורמט פלט</label>
                            <select onchange="cart[${i}].type = this.value">
                                <option value="audio" ${item.type==='audio'?'selected':''}>MP3 (שמע)</option>
                                <option value="video" ${item.type==='video'?'selected':''}>MP4 (סרטון)</option>
                            </select>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleCart(forceOpen = false) {
            const el = document.getElementById('cartOverlay');
            el.style.display = (forceOpen || el.style.display === 'none' || el.style.display === '') ? 'flex' : 'none';
        }

        function applySmartFolders(mode) {
            cart.forEach(item => {
                if(mode === 'playlist' && currentPlaylistName) { item.folder = currentPlaylistName; }
                else if(mode === 'artist') { item.folder = item.uploader; }
            });
            updateUI();
        }

        function applyBulkBitrate() {
            const br = document.getElementById('bulkBitrate').value;
            cart.forEach(item => { item.bitrate = br; });
            updateUI();
        }

        async function startDownload() {
            if(cart.length === 0) return;
            const btn = document.getElementById('dlBtn');
            btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> מעבד זמני FFmpeg, צורב Metadata ומוריד במקביל...";
            btn.disabled = true;

            try {
                const res = await fetch(`${SERVER_URL}/bundle`, {
                    method: 'POST', headers: {'Content-Type': 'text/plain'}, body: JSON.stringify(cart)
                });
                const { zip_id } = await res.json();
                window.location.href = `${SERVER_URL}/download/${zip_id}`;
                btn.innerHTML = "✨ הכל מוכן! ה-ZIP יורד למחשב.";
                setTimeout(() => { cart = []; updateUI(); toggleCart(false); btn.disabled = false; btn.innerHTML = "<i class='fa-solid fa-play'></i> הפעל הורדה מקבילית, צרוב מטא-דאטה והורד ZIP"; }, 4000);
            } catch(e) { alert("העיבוד נכשל."); btn.disabled = false; }
        }
    </script>
</body>
</html>
